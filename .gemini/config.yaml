have_fun: false
memory_config:
  disabled: false
code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: 12
  pull_request_opened:
    help: false
    summary: true
    code_review: true
    include_drafts: false
ignore_patterns:
  - "**/.git/**"
  - "**/.next/**"
  - "**/.nuxt/**"
  - "**/.turbo/**"
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/coverage/**"
  - "**/.handoffkit/**"
  - "**/.tmp-checkpoints/**"
  - "**/.tmp-release-checkpoints/**"
  - "**/.venv/**"
  - "**/__pycache__/**"
  - "**/*.pyc"
  - "**/*.sqlite"
  - "**/*.sqlite-shm"
  - "**/*.sqlite-wal"
  - "**/*.db"
  - "**/*.lock"
  - "**/package-lock.json"
  - "**/pnpm-lock.yaml"
  - "**/yarn.lock"
