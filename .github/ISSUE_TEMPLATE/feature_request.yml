name: Feature request
description: Suggest a focused improvement to HandoffKit.
title: "[feature] "
labels: ["feature", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What handoff problem should this solve?
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Expected Behavior
      description: What should HandoffKit do from the user's or system's perspective?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: "- [ ] ..."
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Test / Verification
      description: Expected typecheck, test, build, CLI smoke, or manual verification.
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk Area
      options:
        - Low
        - CLI output
        - Git/filesystem writes
        - Redaction/security
        - Release/package publishing
        - Cache/checkpoint artifacts
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Privacy, determinism, output size, or compatibility concerns.
