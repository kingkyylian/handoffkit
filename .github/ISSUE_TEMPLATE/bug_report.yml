name: Bug report
description: Report incorrect or unsafe HandoffKit behavior.
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands, repo state, or fixture needed to reproduce.
      placeholder: |
        handoffkit pack --goal "..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: HandoffKit version
      placeholder: "0.1.0"
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "22.x"
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Avoid pasting secrets. Redact any sensitive output first.
