name: Bug
description: Report incorrect, unsafe, or regressed HandoffKit behavior.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken? Include expected and actual behavior.
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands, repository state, or fixture needed to reproduce.
      placeholder: |
        handoffkit pack --goal "..."
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, stack trace, failing test, fixture, or related file and line.
  - type: input
    id: version
    attributes:
      label: HandoffKit version
      placeholder: "0.6.0"
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "22.x"
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What must be true for this bug to be fixed?
      placeholder: "- [ ] ..."
    validations:
      required: true
